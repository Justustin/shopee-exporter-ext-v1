<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Shopee Exporter</title>
  <style>
    :root {
      --bg: #fff8f2;
      --panel: #ffffff;
      --border: #f0d7c4;
      --brand: #ee4d2d;
      --brand-dark: #d63d1e;
      --text: #2f241d;
      --muted: #756456;
      --success: #1a7f45;
      --success-bg: #e8f5ed;
      --warning: #9a5b05;
      --warning-bg: #fff2dd;
      --danger: #b3342b;
      --danger-bg: #fde9e7;
      --shadow: 0 12px 32px rgba(124, 70, 29, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      padding: 16px;
      font: 13px/1.45 "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(238, 77, 45, 0.11), transparent 34%),
        linear-gradient(180deg, #fff8f2 0%, #fff 100%);
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    h1 {
      font-size: 18px;
      color: var(--brand);
      margin-bottom: 4px;
    }

    .subtle {
      color: var(--muted);
      font-size: 11px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .metric {
      background: #fff4eb;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .metric-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
      color: var(--brand);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f5e2d5;
    }

    .status-row:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }

    .status-label {
      color: var(--muted);
      font-size: 11px;
    }

    .status-value {
      text-align: right;
      font-size: 12px;
      font-weight: 700;
    }

    .message {
      display: none;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .message.visible { display: block; }
    .message.info { background: #edf5ff; color: #1f5e9c; }
    .message.success { background: var(--success-bg); color: var(--success); }
    .message.warning { background: var(--warning-bg); color: var(--warning); }
    .message.error { background: var(--danger-bg); color: var(--danger); }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s ease, opacity 0.15s ease;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .btn-start {
      background: var(--brand);
      color: #fff;
    }

    .btn-start:hover:not(:disabled) {
      background: var(--brand-dark);
    }

    .btn-excel {
      background: #1e88e5;
      color: #fff;
    }

    .btn-excel:hover:not(:disabled) {
      background: #1976d2;
    }

    .btn-csv {
      background: #f3eee9;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-csv:hover:not(:disabled) {
      background: #ece5de;
    }

    .footer {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .footer a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="stack">
    <section class="card">
      <h1>Shopee Exporter</h1>
      <div class="subtle">Click Start. When orders appear, export.</div>
      <div class="summary">
        <div class="metric">
          <div class="metric-label">Captured</div>
          <div class="metric-value" id="orderCount">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Remaining</div>
          <div class="metric-value" id="remainingCount">0</div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="status-row">
        <div class="status-label">Status</div>
        <div class="status-value" id="statusText">Idle</div>
      </div>
      <div class="status-row">
        <div class="status-label">Last run</div>
        <div class="status-value" id="lastRunText">Never</div>
      </div>
      <div class="status-row">
        <div class="status-label">File name</div>
        <div class="status-value" id="fileNameText">shopee-export-YYYY-MM-DD.xls</div>
      </div>
    </section>

    <div class="message" id="messageBox"></div>

    <button class="btn-start" id="btnStart">Start</button>
    <button class="btn-excel" id="btnExportExcel" disabled>Export Excel</button>
    <button class="btn-csv" id="btnExportCSV" disabled>Export CSV</button>

    <section class="card footer">
      This popup clears old data and runs a fresh sync when you press <strong>Start</strong>.
      <br><br>
      Need different export names? <a href="#" id="settingsLink">Open settings</a>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
